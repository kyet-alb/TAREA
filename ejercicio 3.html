<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Propuesta 3: Interactivo</title>
    <style> body { margin: 0; overflow: hidden; } </style>
</head>
<body>
    <div style="position: absolute; top: 10px; left: 10px; color: white; font-family: sans-serif; background: rgba(0,0,0,0.5); padding: 10px;">
        <p><strong>Controles:</strong></p>
        <p>Flechas Izq/Der: Mover (Traslación)</p>
        <p>Flechas Arriba/Abajo: Girar (Rotación)</p>
        <p>Teclas + / -: Escalar (Tamaño)</p>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        // 1. CONFIGURACIÓN BÁSICA
        const scene = new THREE.Scene();
        // Fondo gris oscuro para que resalten los colores de los ejes
        scene.background = new THREE.Color(0x222222);
        // el Nro 75 define cuanto estara el cubo alejado de la camara, el 0.1 define lo minimo que se acepta y el 1000 lo maximo que se acepta para mostrar objetos en la escena
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        // Crea el motor que usa WebGL (una tecnología del navegador
        // que permite usar la tarjeta gráfica para dibujar 3D rápido)
        const renderer = new THREE.WebGLRenderer();
        // Configuramos el tamaño del renderizador para que ocupe 
        // toda la ventana del navegador
        renderer.setSize(window.innerWidth, window.innerHeight);
        // Agrega el lienzo del renderizador al cuerpo del documento 
        // para que sea visible en la página
        document.body.appendChild(renderer.domElement);

        // 2. CREAR EL CUBO
        const geometry = new THREE.BoxGeometry();
        const material = new THREE.MeshNormalMaterial(); // Colores basados en la orientación de las caras
        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube);
        
        // esto crea el plano cartesiano x,y,z
        const axesHelper = new THREE.AxesHelper(5);
        
        // Agregamos los ejes a la escena para que sean visibles
        scene.add(axesHelper);

        camera.position.z = 5;

        // Objeto para guardar el estado de las teclas presionadas
        const teclas = {// Inicialmente, ninguna tecla está presionada
            ArrowUp: false,
            ArrowDown: false,
            ArrowLeft: false,
            ArrowRight: false,
            Plus: false,
            Minus: false
        };

        // Escuchar cuando se presiona una tecla
        window.addEventListener('keydown', (e) => {
            // Para las teclas + y -, como no son identificadores válidos
            // las manejamos por separado
            if(e.key === "+") teclas.Plus = true;
            if(e.key === "-") teclas.Minus = true;
            // Para las flechas, verificamos si 
            // la tecla existe en nuestro objeto
            if(teclas.hasOwnProperty(e.key)) teclas[e.key] = true;
        });

        // Escuchar cuando se suelta una tecla
        window.addEventListener('keyup', (e) => {
            // Al soltar la tecla, actualizamos el estado a false
            if(e.key === "+") teclas.Plus = false;
            if(e.key === "-") teclas.Minus = false;
            // Para las flechas, verificamos si
            if(teclas.hasOwnProperty(e.key)) teclas[e.key] = false;
        });

        // 3. BUCLE DE ANIMACIÓN
        function animate() {
            requestAnimationFrame(animate);

            // TRASLACIÓN (Eje X)
            if (teclas.ArrowLeft) cube.position.x -= 0.1;
            if (teclas.ArrowRight) cube.position.x += 0.1;

            // ROTACIÓN (Eje Y)
            if (teclas.ArrowUp) cube.rotation.y += 0.1;
            if (teclas.ArrowDown) cube.rotation.y -= 0.1;

            // ESCALADO (Tamaño uniforme)
            if (teclas.Plus) cube.scale.multiplyScalar(1.05); // Aumenta 5%
            if (teclas.Minus) cube.scale.multiplyScalar(0.95); // Reduce 5%

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
